<div class="page auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <p class="eyebrow">Create Account</p>
      <h2>Register with Your Trading Portal</h2>
      <p class="subtitle">Set up your account securely and start trading.</p>
    </div>

    <form (ngSubmit)="register()" class="auth-form">
      <div class="form-group"><label>First Name</label><input type="text" [(ngModel)]="user.firstName" name="firstName" placeholder="First Name" required></div>
      <div class="form-group"><label>Last Name</label><input type="text" [(ngModel)]="user.lastName" name="lastName" placeholder="Last Name" required></div>
      <div class="form-group"><label>Email</label><input type="email" [(ngModel)]="user.email" name="email" placeholder="name@example.com" required></div>
      <div class="form-group"><label>Password</label><input type="password" [(ngModel)]="user.password" name="password" placeholder="••••••••" required></div>
      <div class="form-group"><label>Age</label><input type="number" [(ngModel)]="user.age" name="age" placeholder="Age" required></div>
      <button class="primary-btn" type="submit">Register</button>
    </form>

    <p class="footer">Already registered? <a routerLink="/">Login</a></p>
  </div>
</div>
