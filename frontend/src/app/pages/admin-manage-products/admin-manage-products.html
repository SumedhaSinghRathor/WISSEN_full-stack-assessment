<div class="page">
    <div class="card-wrapper">

        <div class="header">
            <h2>Manage Products</h2>
            <button (click)="goToAdd()">➕ Add Product</button>
        </div>
        <div class="grid">
            <div *ngFor="let p of products" class="card">

                <div class="top">
                    <h3>{{p.name}}</h3>
                    <span class="ticker">{{p.ticker}}</span>
                </div>

               <p class="price">₹ {{p.current_price | number:'1.2-2'}}</p>
                <button class="edit-btn" (click)="edit(p)">✏ Edit</button>
                <button class="delete-btn" (click)="delete(p.asset_id)">
                    Delete
                </button>

            </div>
        </div>

    </div>
</div>
