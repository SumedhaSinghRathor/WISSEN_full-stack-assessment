<h2 class="title">📈 Stocks Dashboard</h2>

<div class="grid">
  <div *ngFor="let p of products" class="card">

    <div class="top">
      <h3>{{p.name}}</h3>
      <span class="ticker">{{p.ticker}}</span>
    </div>

    <div class="bottom">
      <p class="price">₹ {{p.current_price}}</p>
      <span class="trend">+2.5%</span> <!-- optional -->
    </div>

  </div>
</div>
