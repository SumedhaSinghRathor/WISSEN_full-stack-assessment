<h2 class="title">📈 Stocks Dashboard</h2>

<div class="grid">
  <div *ngFor="let p of products" class="card">

    <div class="top">
      <h3>{{p.name}}</h3>
      <span class="ticker">{{p.ticker}}</span>
    </div>

    <div class="bottom">
     <p 
  class="price"
  [ngClass]="{
    'green': p.current_price > p.opening_price,
    'red': p.current_price < p.opening_price
  }"
>
  ₹ {{p.current_price | number:'1.2-2'}}
</p>
    </div>

  </div>
</div>
