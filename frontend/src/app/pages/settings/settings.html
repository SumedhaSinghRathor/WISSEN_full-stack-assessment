<div class="page auth-page">
  <div class="auth-card settings-card">
    <div class="auth-header">
      <p class="eyebrow">Account Settings</p>
      <h2>{{ activeSection === 'wallet' ? 'Add Wallet Amount' : 'Change Password' }}</h2>
      <p class="subtext" *ngIf="activeSection === 'wallet'">Add money to your wallet for trading and keep your balance updated.</p>
      <p class="subtext" *ngIf="activeSection === 'password'">Secure your account with a strong password. Password must be at least 6 characters.</p>
    </div>

    <div class="auth-form">
      <div class="top-row"><button type="button" class="link-btn" (click)="goBack()">← Back</button></div>
      <div class="switch-row">
        <label>Select action</label>
        <select [(ngModel)]="activeSection" class="action-select">
          <option value="wallet">Add Wallet Amount</option>
          <option value="password">Change Password</option>
        </select>
      </div>
      <div *ngIf="message" class="toast" [class.error]="isError">{{ message }}</div>
      <div *ngIf="activeSection === 'wallet'" class="wallet-box">
        <div class="wallet-head"><label>Wallet Balance</label><span class="wallet-value">₹{{ wallet | number:'1.2-2' }}</span></div>
        <div class="wallet-row"><input type="number" [(ngModel)]="addAmount" name="addAmount" placeholder="Add amount" min="0" /><button class="small-btn" (click)="addWallet()">Add</button></div>
      </div>
      <div *ngIf="activeSection === 'password'">
        <div class="form-group"><label>Current Password</label><input type="password" [(ngModel)]="currentPassword" name="currentPassword" placeholder="Enter current password"></div>
        <div class="form-group"><label>New Password</label><input type="password" [(ngModel)]="newPassword" name="newPassword" placeholder="Enter new password (min 6 chars)"></div>
        <button class="primary-btn" (click)="changePassword()">Change Password</button>
      </div>
    </div>
  </div>
</div>
